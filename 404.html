<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada (404) - Centro AMA</title>

  <!-- Fuentes e íconos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --ama-teal: #00a896;
      --ama-magenta: #e91e63;
      --ama-purple: #8e24aa;
      --text-main: #374151;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: #f8fafc;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* CONTENIDO PRINCIPAL DEL ERROR 404 */
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
    }

    .error-code {
      font-family: 'Montserrat', sans-serif;
      font-size: 7rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--ama-teal), var(--ama-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 15px;
    }

    .error-icon {
      font-size: 3.5rem;
      color: var(--ama-magenta);
      margin-bottom: 20px;
    }

    .error-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 12px;
    }

    .error-description {
      font-size: 1.1rem;
      color: #6b7280;
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 30px;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--ama-teal), var(--ama-magenta));
      color: #ffffff;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(0, 168, 150, 0.3);
      transition: all 0.3s ease;
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 22px rgba(233, 30, 99, 0.4);
    }
  </style>
</head>
<body>

  <!-- Mensaje de Error 404 -->
  <main class="error-container">
    <div class="error-icon">
      <i class="fa-solid fa-compass-drafting"></i>
    </div>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">¡Ups! Página no encontrada</h2>
    <p class="error-description">
      Parece que la página que buscas no existe, ha cambiado de dirección o no está disponible temporalmente.
    </p>
    <a href="index.html" class="btn-home">
      <i class="fa-solid fa-house"></i> Regresar al Inicio
    </a>
  </main>

  <!-- Pie de página dinámico -->
  <div id="footer-container"></div>

  <script>
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => console.error('Error al cargar el footer:', error));
  </script>

</body>
</html>
